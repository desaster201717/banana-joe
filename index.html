<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BananaJoe | Modern Game</title>
    <link rel="stylesheet" href="style.css">
    <!-- Meta for SEO -->
    <meta name="description" content="BananaJoe - A fast-paced modern web game. Collect bananas, dodge nothing, and get the highscore!">
</head>

<body>

    <!-- Music Layer -->
    <div id="soundCloudLayer">
        <iframe scrolling="no" frameborder="no" allow="autoplay"
            src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/278796973&color=%23ff5500&auto_play=true&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false&visual=false"></iframe>
    </div>

    <!-- Fullscreen Button -->
    <button id="fullscreen-btn">⛶ Vollbild</button>

    <!-- Start Screen -->
    <div id="startScreen" class="glass">
        <h1>BananaJoe</h1>
        <p>Willkommen zurück! Bitte gib deinen Namen ein:</p>
        <input type="text" id="playerNameInput" placeholder="Dein Spielername" maxlength="15">
        <button id="start-btn">Join Game</button>
        <button id="show-highscores-btn">Hall of Fame</button>
        
        <div id="startHighscoreContainer" style="display: none;">
            <h2>Global Legends</h2>
            <ul id="startHighscoreList">
                <li>Laden...</li>
            </ul>
        </div>
    </div>

    <!-- Game Container -->
    <div id="container">
        <div id="player"></div>
    </div>

    <!-- HUD -->
    <div id="score">Score: 0</div>
    <div id="spawnTime">Spawn Time: 2.5s <br> Active: 0/10</div>

    <!-- Game Over Screen -->
    <div id="gameOver" class="glass">
        <h1>Busted!</h1>
        <div id="finalScore" style="font-size: 32px; color: var(--primary-color); margin-bottom: 20px;"></div>
        
        <div id="highscoreContainer">
            <h2>Leaderboard</h2>
            <ul id="highscoreList">
                <li>Laden...</li>
            </ul>
        </div>

        <button style="margin-top: 30px; background: var(--accent-color); color: white;" onclick="location.reload()">Noch einmal</button>
    </div>

    <!-- Touch Controls -->
    <div id="joystick-zone">
        <div id="joystick-base">
            <div id="joystick-stick"></div>
        </div>
    </div>

    <script src="game.js"></script>
</body>

</html>
