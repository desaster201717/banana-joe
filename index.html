<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BananaJoe</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Music Layer -->
    <div id="soundCloudLayer">
        <button id="fullscreen-btn" style="padding: 5px 10px; cursor: pointer;">Vollbildmodus</button>
        <!-- Hidden iframe for music (per user original code) -->
        <iframe scrolling="no" frameborder="no" allow="autoplay"
            src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/278796973&color=%23ff5500&auto_play=true&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false&visual=false"></iframe>
    </div>

    <!-- Start Screen -->
    <div id="startScreen">
        <h1>BananaJoe</h1>
        <p>Bitte gib deinen Namen ein:</p>
        <input type="text" id="playerNameInput" placeholder="Dein Name" maxlength="15"><br>
        <button id="start-btn">Spiel starten</button>
    </div>

    <!-- Game Container -->
    <div id="container">
        <div id="player"></div>
        <!-- Targets are spawned dynamically here -->
    </div>

    <!-- UI Elements -->
    <div id="score">Score: 0</div>
    <div id="spawnTime">Spawn Time: 5s</div>

    <!-- Game Over Screen -->
    <div id="gameOver">
        <h1>Game Over</h1>
        <div id="finalScore" style="font-size: 24px;"></div>
        
        <div id="highscoreContainer">
            <h2>Top 10 Highscores</h2>
            <ul id="highscoreList">
                <li>Laden...</li>
            </ul>
        </div>

        <button onclick="location.reload()">Neustart</button>
    </div>

    <!-- Touch Controls -->
    <div id="controls">
        <div class="row">
            <button id="left-btn">←</button>
            <button id="down-btn">↓</button>
            <button id="right-btn">→</button>
        </div>
        <button id="up-btn">↑</button>
    </div>

    <script src="game.js"></script>
</body>

</html>
